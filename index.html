<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <link rel="stylesheet" href="styles/main.css">

    <title>Digital Clock</title>
</head>
<body>
    <header>
        <img src="images/clock.png" alt="Clock">
        <h2>Current Time</h2>
    </header>
    <main>
        <div class="container">
            <div class="digitalclock">
                <h3 id="day"></h3>
                <h3 id="hour"></h3>
                <h3 id="c1">:</h3>
                <h3 id="min"></h3>
                <h3 id="c2">:</h3>
                <h3 id="sec"></h3>
                <h3 id="ampm"></h3>
            </div>
        </div>
    </main>
    <footer>
         <p></p>&copy; <span id="cyear"></span> &nbsp; Tyler McPherson Productions</p>
    </footer>
</body>
</html>

<script src="js/digitalclock.js"></script>
